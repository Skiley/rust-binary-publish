name: Publish (reusable)

# Generic release publisher: one INPUT describes how to produce the release
# artifacts; one or more OUTPUTS consume them. Reusable workflows only accept
# scalar inputs, so `input` (object) and `outputs` (array) are passed as JSON
# strings and parsed by the `setup` job.
#
# Currently supported:
#   input types : rust-binaries, tauri-app
#   output types: github-release, npm-package
#                 (npm-package applies to rust-binaries only)
#
# Adding an input type = add a producer job gated on `setup.outputs.input-type`
# that uploads `build-*` artifacts; the existing outputs consume them unchanged.

on:
  workflow_call:
    inputs:
      input:
        description: |
          JSON object describing how to produce the release artifacts.
          Shape: { "type": <input-type>, ... }. Supported types:

            rust-binaries (cross-compiled CLI binaries):
              binary-name    (required) cargo binary name
              crate          (optional) cargo package to build with -p
              targets        (optional) JSON array of { target, runner }
              readme         (optional) README bundled into each archive (default README.md)
              archive-prefix (optional) archive name prefix (default <repo>-cli)

            tauri-app (per-OS Tauri bundles: .deb/.rpm/.AppImage/.dmg/.msi/.exe):
              project-path     (optional) dir containing the Tauri app (default ".")
              package-manager  (optional) pnpm|yarn|npm|bun (default: detect from lockfile)
              node-version     (optional) Node version to set up (default "24")
              linux-deps       (optional) apt packages for Linux runners (default: Tauri/WebKit set)
              install-command  (optional) JS dependency install command (default: per package manager)
              build-command    (optional) build command (default "node_modules/.bin/tauri build")
              post-build       (optional) command run after the build, in project-path, on every OS
              targets          (optional) JSON array of { key, runner, args?, rust-targets? }
        required: true
        type: string
      outputs:
        description: |
          JSON array of output descriptors, each { "type": <output-type>, ... }.
          Supported types:

            github-release:
              extra-assets (optional) newline-separated extra files to attach
              env-prefix   (optional) env-var prefix for the install scripts (default uppercased repo name)
                                      (rust-binaries only — install scripts are not generated for tauri-app)

            npm-package (rust-binaries only):
              package-name        (required) full npm name including scope
              package-description (required) description for the generated package.json
        required: true
        type: string
      tag:
        description: "Release tag to build. Defaults to the triggering ref name."
        required: false
        type: string
        default: ""
    secrets:
      NPM_TOKEN:
        description: "npm automation token. Required only for the npm-package output without trusted publishing."
        required: false

env:
  CARGO_TERM_COLOR: always
  TAG: ${{ inputs.tag || github.ref_name }}

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      input-type: ${{ steps.parse.outputs.input-type }}
      targets: ${{ steps.parse.outputs.targets }}
      # rust-binaries
      binary-name: ${{ steps.parse.outputs.binary-name }}
      crate: ${{ steps.parse.outputs.crate }}
      readme: ${{ steps.parse.outputs.readme }}
      archive-prefix: ${{ steps.parse.outputs.archive-prefix }}
      # tauri-app
      tauri-project-path: ${{ steps.parse.outputs.tauri-project-path }}
      tauri-package-manager: ${{ steps.parse.outputs.tauri-package-manager }}
      tauri-node-version: ${{ steps.parse.outputs.tauri-node-version }}
      tauri-linux-deps: ${{ steps.parse.outputs.tauri-linux-deps }}
      tauri-install-command: ${{ steps.parse.outputs.tauri-install-command }}
      tauri-build-command: ${{ steps.parse.outputs.tauri-build-command }}
      tauri-post-build: ${{ steps.parse.outputs.tauri-post-build }}
      # outputs
      want-github-release: ${{ steps.parse.outputs.want-github-release }}
      gh-extra-assets: ${{ steps.parse.outputs.gh-extra-assets }}
      gh-env-prefix: ${{ steps.parse.outputs.gh-env-prefix }}
      want-npm: ${{ steps.parse.outputs.want-npm }}
      npm-package-name: ${{ steps.parse.outputs.npm-package-name }}
      npm-package-description: ${{ steps.parse.outputs.npm-package-description }}
    steps:
      - name: Parse input & outputs descriptors
        id: parse
        env:
          INPUT_JSON: ${{ inputs.input }}
          OUTPUTS_JSON: ${{ inputs.outputs }}
          DEFAULT_RUST_TARGETS: '[{"target":"x86_64-unknown-linux-musl","runner":"ubuntu-24.04"},{"target":"aarch64-unknown-linux-musl","runner":"ubuntu-24.04-arm"},{"target":"aarch64-apple-darwin","runner":"macos-latest"},{"target":"x86_64-apple-darwin","runner":"macos-latest"},{"target":"x86_64-pc-windows-msvc","runner":"windows-2025"},{"target":"aarch64-pc-windows-msvc","runner":"windows-2025"}]'
          DEFAULT_TAURI_TARGETS: '[{"key":"linux-x86_64","runner":"ubuntu-24.04"},{"key":"linux-aarch64","runner":"ubuntu-24.04-arm"},{"key":"macos-universal","runner":"macos-latest","args":"--target universal-apple-darwin","rust-targets":"aarch64-apple-darwin,x86_64-apple-darwin"},{"key":"windows-x86_64","runner":"windows-latest"}]'
          DEFAULT_TAURI_LINUX_DEPS: 'libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils'
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY##*/}"

          jq -e . >/dev/null 2>&1 <<<"$INPUT_JSON" || { echo "::error::'input' must be valid JSON."; exit 1; }
          jq -e 'type == "array"' >/dev/null 2>&1 <<<"$OUTPUTS_JSON" || { echo "::error::'outputs' must be a JSON array."; exit 1; }

          # rust-binaries fields
          binary_name=""; crate=""; readme=""; archive_prefix=""
          # tauri-app fields
          t_project_path="."; t_pm=""; t_node="24"; t_linux_deps="$DEFAULT_TAURI_LINUX_DEPS"
          t_install=""; t_build=""; t_post_build=""

          # --- input ------------------------------------------------------
          input_type=$(jq -r '.type // ""' <<<"$INPUT_JSON")
          case "$input_type" in
            rust-binaries)
              binary_name=$(jq -r '."binary-name" // ""' <<<"$INPUT_JSON")
              [ -n "$binary_name" ] || { echo "::error::rust-binaries requires 'input.binary-name'."; exit 1; }
              crate=$(jq -r '.crate // ""' <<<"$INPUT_JSON")
              readme=$(jq -r '.readme // "README.md"' <<<"$INPUT_JSON")
              archive_prefix=$(jq -r --arg d "${repo_name}-cli" '."archive-prefix" // $d' <<<"$INPUT_JSON")
              targets=$(jq -c --argjson d "$DEFAULT_RUST_TARGETS" '.targets // $d' <<<"$INPUT_JSON")
              ;;
            tauri-app)
              t_project_path=$(jq -r '."project-path" // "."' <<<"$INPUT_JSON")
              t_pm=$(jq -r '."package-manager" // ""' <<<"$INPUT_JSON")
              t_node=$(jq -r '."node-version" // "24"' <<<"$INPUT_JSON")
              t_linux_deps=$(jq -r --arg d "$DEFAULT_TAURI_LINUX_DEPS" '."linux-deps" // $d' <<<"$INPUT_JSON")
              t_install=$(jq -r '."install-command" // ""' <<<"$INPUT_JSON")
              t_build=$(jq -r '."build-command" // ""' <<<"$INPUT_JSON")
              t_post_build=$(jq -r '."post-build" // ""' <<<"$INPUT_JSON")
              targets=$(jq -c --argjson d "$DEFAULT_TAURI_TARGETS" '.targets // $d' <<<"$INPUT_JSON")
              ;;
            "") echo "::error::'input.type' is required."; exit 1 ;;
            *)  echo "::error::Unsupported input.type '$input_type' (supported: rust-binaries, tauri-app)."; exit 1 ;;
          esac

          # --- outputs ----------------------------------------------------
          known='["github-release","npm-package"]'
          jq -r --argjson known "$known" '.[].type | select(. != null) | select(IN($known[]) | not)' <<<"$OUTPUTS_JSON" \
            | while IFS= read -r t; do [ -n "$t" ] && echo "::warning::Ignoring unknown output type '$t'."; done

          gh=$(jq -c 'map(select(.type == "github-release"))[0] // empty' <<<"$OUTPUTS_JSON")
          if [ -n "$gh" ]; then
            want_gh=true
            gh_extra_assets=$(jq -r '."extra-assets" // ""' <<<"$gh")
            default_env_prefix=$(printf '%s' "$repo_name" | tr '[:lower:]-' '[:upper:]_')
            gh_env_prefix=$(jq -r --arg d "$default_env_prefix" '."env-prefix" // $d' <<<"$gh")
          else
            want_gh=false; gh_extra_assets=""; gh_env_prefix=""
          fi

          npm=$(jq -c 'map(select(.type == "npm-package"))[0] // empty' <<<"$OUTPUTS_JSON")
          if [ -n "$npm" ]; then
            want_npm=true
            npm_name=$(jq -r '."package-name" // ""' <<<"$npm")
            npm_desc=$(jq -r '."package-description" // ""' <<<"$npm")
            { [ -n "$npm_name" ] && [ -n "$npm_desc" ]; } \
              || { echo "::error::npm-package requires 'package-name' and 'package-description'."; exit 1; }
          else
            want_npm=false; npm_name=""; npm_desc=""
          fi

          if [ "$want_gh" = false ] && [ "$want_npm" = false ]; then
            echo "::error::'outputs' must contain at least one supported output (github-release, npm-package)."; exit 1
          fi
          if [ "$input_type" = "tauri-app" ] && [ "$want_npm" = true ]; then
            echo "::error::The 'npm-package' output is not supported for the 'tauri-app' input."; exit 1
          fi

          # --- emit -------------------------------------------------------
          {
            echo "input-type=$input_type"
            echo "targets=$targets"
            echo "binary-name=$binary_name"
            echo "crate=$crate"
            echo "readme=$readme"
            echo "archive-prefix=$archive_prefix"
            echo "tauri-project-path=$t_project_path"
            echo "tauri-package-manager=$t_pm"
            echo "tauri-node-version=$t_node"
            echo "tauri-linux-deps=$t_linux_deps"
            echo "tauri-install-command=$t_install"
            echo "tauri-build-command=$t_build"
            echo "tauri-post-build=$t_post_build"
            echo "want-github-release=$want_gh"
            echo "gh-env-prefix=$gh_env_prefix"
            echo "want-npm=$want_npm"
            echo "npm-package-name=$npm_name"
            echo "npm-package-description=$npm_desc"
            echo "gh-extra-assets<<__RBP_EOF__"
            printf '%s\n' "$gh_extra_assets"
            echo "__RBP_EOF__"
          } >> "$GITHUB_OUTPUT"

  # --- INPUT: rust-binaries -------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: setup
    if: needs.setup.outputs.input-type == 'rust-binaries'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
      - if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y musl-tools
      - run: rustup target add "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
      - name: Build and package
        env:
          TARGET: ${{ matrix.target }}
          BIN: ${{ needs.setup.outputs.binary-name }}
          CRATE: ${{ needs.setup.outputs.crate }}
          PREFIX: ${{ needs.setup.outputs.archive-prefix }}
          README: ${{ needs.setup.outputs.readme }}
        run: |
          pflag=()
          [ -n "$CRATE" ] && pflag=(-p "$CRATE")
          cargo build --release "${pflag[@]}" --target "$TARGET"

          case "$TARGET" in
            *windows*) exe="${BIN}.exe" ;;
            *)         exe="${BIN}" ;;
          esac

          dir="stage/${PREFIX}-${TARGET}"
          mkdir -p "$dir"
          cp "target/${TARGET}/release/${exe}" "$dir/"
          [ -f "$README" ] && cp "$README" "$dir/"

          cd stage
          case "$TARGET" in
            *windows*) 7z a "${PREFIX}-${TARGET}.zip" "${PREFIX}-${TARGET}" > /dev/null ;;
            *)         tar cJf "${PREFIX}-${TARGET}.tar.xz" "${PREFIX}-${TARGET}" ;;
          esac
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.target }}
          path: stage/*-${{ matrix.target }}.*

  # --- INPUT: tauri-app -----------------------------------------------------
  build-tauri:
    name: Bundle (${{ matrix.key }})
    needs: setup
    if: needs.setup.outputs.input-type == 'tauri-app'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && needs.setup.outputs.tauri-linux-deps != ''
        env:
          LINUX_DEPS: ${{ needs.setup.outputs.tauri-linux-deps }}
        run: |
          sudo apt-get update
          sudo apt-get install -y $LINUX_DEPS

      - name: Resolve package manager & commands
        id: pm
        env:
          PROJECT_PATH: ${{ needs.setup.outputs.tauri-project-path }}
          PM_OVERRIDE: ${{ needs.setup.outputs.tauri-package-manager }}
          INSTALL_OVERRIDE: ${{ needs.setup.outputs.tauri-install-command }}
        run: |
          set -euo pipefail
          pm="$PM_OVERRIDE"
          if [ -z "$pm" ]; then
            if   [ -f "$PROJECT_PATH/pnpm-lock.yaml" ];   then pm=pnpm
            elif [ -f "$PROJECT_PATH/yarn.lock" ];        then pm=yarn
            elif [ -f "$PROJECT_PATH/bun.lockb" ] || [ -f "$PROJECT_PATH/bun.lock" ]; then pm=bun
            elif [ -f "$PROJECT_PATH/package-lock.json" ]; then pm=npm
            else pm=npm; fi
          fi
          case "$pm" in
            pnpm) node_cache=pnpm; lockfile="$PROJECT_PATH/pnpm-lock.yaml";   install="pnpm install --frozen-lockfile" ;;
            yarn) node_cache=yarn; lockfile="$PROJECT_PATH/yarn.lock";        install="yarn install --frozen-lockfile" ;;
            npm)  node_cache=npm;  lockfile="$PROJECT_PATH/package-lock.json"; install="npm ci" ;;
            bun)  node_cache="";   lockfile="";                                install="bun install --frozen-lockfile" ;;
            *) echo "::error::Unsupported package-manager '$pm' (supported: pnpm, yarn, npm, bun)."; exit 1 ;;
          esac
          [ -n "$INSTALL_OVERRIDE" ] && install="$INSTALL_OVERRIDE"
          {
            echo "pm=$pm"
            echo "node-cache=$node_cache"
            echo "lockfile=$lockfile"
            echo "install=$install"
          } >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        if: steps.pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v6.0.8

      - name: Set up Bun
        if: steps.pm.outputs.pm == 'bun'
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ needs.setup.outputs.tauri-node-version }}
          cache: ${{ steps.pm.outputs.node-cache }}
          cache-dependency-path: ${{ steps.pm.outputs.lockfile }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
        with:
          target: ${{ matrix.rust-targets }}

      - name: Install JS dependencies
        working-directory: ${{ needs.setup.outputs.tauri-project-path }}
        env:
          INSTALL_COMMAND: ${{ steps.pm.outputs.install }}
        run: eval "$INSTALL_COMMAND"

      - name: Build Tauri bundles
        working-directory: ${{ needs.setup.outputs.tauri-project-path }}
        env:
          BUILD_COMMAND: ${{ needs.setup.outputs.tauri-build-command }}
          POST_BUILD: ${{ needs.setup.outputs.tauri-post-build }}
          ARGS: ${{ matrix.args }}
        run: |
          set -euo pipefail
          # Put the project's local CLIs (tauri, vite, tsc, …) on PATH so the
          # build command AND Tauri's `beforeBuildCommand` (spawned as a child
          # shell) resolve them — the package manager would normally do this,
          # but we invoke the binary directly.
          export PATH="$PWD/node_modules/.bin:$PATH"
          cmd="${BUILD_COMMAND:-node_modules/.bin/tauri build}"
          echo "+ $cmd $ARGS"
          eval "$cmd $ARGS"
          if [ -n "$POST_BUILD" ]; then
            echo "+ $POST_BUILD"
            eval "$POST_BUILD"
          fi

      - name: Collect bundles
        env:
          PROJECT_PATH: ${{ needs.setup.outputs.tauri-project-path }}
        run: |
          set -euo pipefail
          mkdir -p dist-bundles
          target_dir="$PROJECT_PATH/src-tauri/target"
          found=0
          # Bundles live at <target>/[<triple>/]release/bundle/<kind>/<file>;
          # match only finished artifacts (skip the unpacked staging dirs).
          while IFS= read -r f; do
            cp "$f" dist-bundles/
            echo "  collected $(basename "$f")"
            found=1
          done < <(find "$target_dir" -type f -path '*/release/bundle/*' \
            \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
               -o -name '*.dmg' -o -name '*.app.tar.gz' \
               -o -name '*.msi' -o -name '*.msi.zip' \
               -o -name '*.exe' -o -name '*.nsis.zip' \
               -o -name '*.sig' \) )
          if [ "$found" != 1 ]; then
            echo "::error::No Tauri bundles found under $target_dir."; exit 1
          fi
          ls -la dist-bundles

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.key }}
          path: dist-bundles/*

  # --- OUTPUT: github-release -----------------------------------------------
  github-release:
    name: GitHub release
    needs: [setup, build, build-tauri]
    if: >-
      always()
      && needs.setup.result == 'success'
      && needs.setup.outputs.want-github-release == 'true'
      && (needs.build.result == 'success' || needs.build.result == 'skipped')
      && (needs.build-tauri.result == 'success' || needs.build-tauri.result == 'skipped')
      && !(needs.build.result == 'skipped' && needs.build-tauri.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Checkout publisher tooling
        if: needs.setup.outputs.input-type == 'rust-binaries'
        uses: actions/checkout@v6.0.2
        with:
          repository: Skiley/rust-binary-publish
          ref: ${{ github.job_workflow_sha }}
          path: .rbp
      - uses: actions/download-artifact@v8.0.1
        with:
          path: assets
          pattern: build-*
          merge-multiple: true
      - name: Render install scripts
        if: needs.setup.outputs.input-type == 'rust-binaries'
        env:
          BIN: ${{ needs.setup.outputs.binary-name }}
          PREFIX: ${{ needs.setup.outputs.archive-prefix }}
          ENV_PREFIX: ${{ needs.setup.outputs.gh-env-prefix }}
        run: |
          name="${GITHUB_REPOSITORY##*/}"
          for f in install.sh install.ps1; do
            sed \
              -e "s#__REPO__#${GITHUB_REPOSITORY}#g" \
              -e "s#__NAME__#${name}#g" \
              -e "s#__BIN__#${BIN}#g" \
              -e "s#__PREFIX__#${PREFIX}#g" \
              -e "s#__ENV_PREFIX__#${ENV_PREFIX}#g" \
              ".rbp/templates/$f" > "assets/$f"
          done
      - name: Stage extra assets
        if: needs.setup.outputs.gh-extra-assets != ''
        env:
          EXTRA_ASSETS: ${{ needs.setup.outputs.gh-extra-assets }}
        run: |
          printf '%s\n' "$EXTRA_ASSETS" | while IFS= read -r line; do
            path="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [ -z "$path" ] && continue
            cp "$path" assets/
          done
      - name: Checksums
        run: cd assets && sha256sum * > sha256.sum
      - name: Create GitHub Release
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes assets/*

  # --- OUTPUT: npm-package (rust-binaries only) -----------------------------
  npm-package:
    name: npm package
    needs: [setup, build]
    if: needs.setup.outputs.want-npm == 'true'
    runs-on: ubuntu-latest
    # No job-level `permissions:` — it inherits the caller's grant. A static
    # `id-token: write` here would force EVERY consumer (even github-release-only
    # ones like Tauri apps) to grant id-token, since a called workflow's job
    # permissions are validated against the caller for all jobs, run or not.
    # npm-package consumers must grant `id-token: write` at the caller level.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout publisher tooling
        uses: actions/checkout@v6.0.2
        with:
          repository: Skiley/rust-binary-publish
          ref: ${{ github.job_workflow_sha }}
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist-artifacts
          pattern: build-*
          merge-multiple: true
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Build npm package
        env:
          PACKAGE: ${{ needs.setup.outputs.npm-package-name }}
          BIN: ${{ needs.setup.outputs.binary-name }}
          DESCRIPTION: ${{ needs.setup.outputs.npm-package-description }}
          PREFIX: ${{ needs.setup.outputs.archive-prefix }}
          TARGETS: ${{ needs.setup.outputs.targets }}
        run: |
          node scripts/build-npm-package.mjs \
            --package "$PACKAGE" \
            --bin "$BIN" \
            --description "$DESCRIPTION" \
            --repo "https://github.com/${GITHUB_REPOSITORY}" \
            --prefix "$PREFIX" \
            --targets "$TARGETS" \
            --version "${TAG#v}" \
            --artifacts dist-artifacts \
            --out npm-dist
      - run: cd npm-dist/pkg && npm publish --access public --provenance
