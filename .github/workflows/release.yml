name: Release (reusable)

on:
  workflow_call:
    inputs:
      bin:
        description: "Binary name produced by cargo."
        required: true
        type: string
      crate:
        description: "Cargo package to build (`cargo build -p <crate>`). Empty builds the workspace default."
        required: false
        type: string
        default: ""
      npm-package:
        description: "Full npm package name including scope, e.g. `@org/package`."
        required: true
        type: string
      npm-description:
        description: "Description for the generated npm package.json."
        required: true
        type: string
      archive-prefix:
        description: "Archive name prefix. Defaults to `<repo-name>-cli`."
        required: false
        type: string
        default: ""
      env-prefix:
        description: "UPPER_CASE prefix for the install scripts' env vars (e.g. MYCLI -> MYCLI_INSTALL_DIR / MYCLI_VERSION). Defaults to the uppercased repo name."
        required: false
        type: string
        default: ""
      readme:
        description: "Path (in the consumer repo) to the README bundled into each archive."
        required: false
        type: string
        default: "README.md"
      targets:
        description: "JSON array of { target, runner } objects to build."
        required: false
        type: string
        default: '[{"target":"x86_64-unknown-linux-musl","runner":"ubuntu-24.04"},{"target":"aarch64-unknown-linux-musl","runner":"ubuntu-24.04-arm"},{"target":"aarch64-apple-darwin","runner":"macos-latest"},{"target":"x86_64-apple-darwin","runner":"macos-latest"},{"target":"x86_64-pc-windows-msvc","runner":"windows-2025"},{"target":"aarch64-pc-windows-msvc","runner":"windows-2025"}]'
      extra-assets:
        description: "Newline-separated list of additional files (in the consumer repo) to attach to the GitHub Release."
        required: false
        type: string
        default: ""
      publish-npm:
        description: "Whether to build and publish the npm package."
        required: false
        type: boolean
        default: true
      tag:
        description: "Release tag to build. Defaults to the triggering ref name."
        required: false
        type: string
        default: ""
    secrets:
      NPM_TOKEN:
        description: "npm automation token. Required only when publish-npm is true, and you're not using trusted publishing."
        required: false

env:
  CARGO_TERM_COLOR: always
  TAG: ${{ inputs.tag || github.ref_name }}

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.targets) }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
      - if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y musl-tools
      - run: rustup target add "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
      - name: Build and package
        env:
          TARGET: ${{ matrix.target }}
          BIN: ${{ inputs.bin }}
          CRATE: ${{ inputs.crate }}
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
          README: ${{ inputs.readme }}
        run: |
          prefix="${ARCHIVE_PREFIX:-${GITHUB_REPOSITORY##*/}-cli}"

          pflag=()
          [ -n "$CRATE" ] && pflag=(-p "$CRATE")
          cargo build --release "${pflag[@]}" --target "$TARGET"

          case "$TARGET" in
            *windows*) exe="${BIN}.exe" ;;
            *)         exe="${BIN}" ;;
          esac

          dir="stage/${prefix}-${TARGET}"
          mkdir -p "$dir"
          cp "target/${TARGET}/release/${exe}" "$dir/"
          [ -f "$README" ] && cp "$README" "$dir/"

          cd stage
          case "$TARGET" in
            *windows*) 7z a "${prefix}-${TARGET}.zip" "${prefix}-${TARGET}" > /dev/null ;;
            *)         tar cJf "${prefix}-${TARGET}.tar.xz" "${prefix}-${TARGET}" ;;
          esac
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: build-${{ matrix.target }}
          path: stage/*-${{ matrix.target }}.*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Checkout publisher tooling
        uses: actions/checkout@v6.0.2
        with:
          repository: Skiley/rust-binary-publish
          ref: ${{ github.job_workflow_sha }}
          path: .rbp
      - uses: actions/download-artifact@v8.0.1
        with:
          path: assets
          pattern: build-*
          merge-multiple: true
      - name: Render install scripts
        env:
          BIN: ${{ inputs.bin }}
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
          ENV_PREFIX: ${{ inputs.env-prefix }}
        run: |
          name="${GITHUB_REPOSITORY##*/}"
          prefix="${ARCHIVE_PREFIX:-${name}-cli}"
          env_prefix="${ENV_PREFIX:-$(printf '%s' "$name" | tr '[:lower:]-' '[:upper:]_')}"

          for f in install.sh install.ps1; do
            sed \
              -e "s#__REPO__#${GITHUB_REPOSITORY}#g" \
              -e "s#__NAME__#${name}#g" \
              -e "s#__BIN__#${BIN}#g" \
              -e "s#__PREFIX__#${prefix}#g" \
              -e "s#__ENV_PREFIX__#${env_prefix}#g" \
              ".rbp/templates/$f" > "assets/$f"
          done
      - name: Stage extra assets
        if: inputs.extra-assets != ''
        env:
          EXTRA_ASSETS: ${{ inputs.extra-assets }}
        run: |
          printf '%s\n' "$EXTRA_ASSETS" | while IFS= read -r line; do
            path="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [ -z "$path" ] && continue
            cp "$path" assets/
          done
      - name: Checksums
        run: cd assets && sha256sum * > sha256.sum
      - name: Create GitHub Release
        run: gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes assets/*

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: release
    if: inputs.publish-npm
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout publisher tooling
        uses: actions/checkout@v6.0.2
        with:
          repository: Skiley/rust-binary-publish
          ref: ${{ github.job_workflow_sha }}
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist-artifacts
          pattern: build-*
          merge-multiple: true
      - uses: actions/setup-node@v6.1.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Build npm package
        env:
          PACKAGE: ${{ inputs.npm-package }}
          BIN: ${{ inputs.bin }}
          DESCRIPTION: ${{ inputs.npm-description }}
          ARCHIVE_PREFIX: ${{ inputs.archive-prefix }}
          TARGETS: ${{ inputs.targets }}
        run: |
          name="${GITHUB_REPOSITORY##*/}"
          prefix="${ARCHIVE_PREFIX:-${name}-cli}"
          node scripts/build-npm-package.mjs \
            --package "$PACKAGE" \
            --bin "$BIN" \
            --description "$DESCRIPTION" \
            --repo "https://github.com/${GITHUB_REPOSITORY}" \
            --prefix "$prefix" \
            --targets "$TARGETS" \
            --version "${TAG#v}" \
            --artifacts dist-artifacts \
            --out npm-dist
      - run: cd npm-dist/pkg && npm publish --access public --provenance
